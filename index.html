<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>自习室 · Study Room</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Cinzel:wght@400;600&family=DM+Mono:wght@300;400&display=swap');
:root{--gold:rgba(210,168,68,1);--gold-dim:rgba(210,168,68,0.18);--gold-faint:rgba(210,168,68,0.07);--ink:#0b0906;--text:rgba(230,212,172,0.92);--muted:rgba(180,158,110,0.5);--green:rgba(72,200,120,0.85);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--ink);font-family:'Noto Serif SC',serif;color:var(--text);min-height:100vh;overflow-x:hidden;}
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 15% 10%,#1c1508 0%,#0b0906 55%,#08070d 100%);}
.glow{position:fixed;border-radius:50%;filter:blur(130px);pointer-events:none;z-index:0;}
.g1{width:700px;height:500px;background:rgba(210,168,68,.055);top:-180px;left:-220px;}
.g2{width:500px;height:400px;background:rgba(100,70,180,.04);bottom:-120px;right:-160px;}
.g3{width:300px;height:300px;background:rgba(210,168,68,.03);bottom:20%;left:30%;}
.site-header{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;padding:1.3rem 2.5rem;border-bottom:1px solid rgba(210,168,68,.07);}
.brand{font-family:'Cinzel',serif;font-size:.8rem;color:rgba(210,168,68,.55);letter-spacing:.35em;display:flex;align-items:center;gap:.7rem;}
.brand-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);opacity:.5;}
.hclock{position:absolute;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;}
.htime{font-family:'DM Mono',monospace;font-size:1.5rem;color:rgba(220,190,110,.9);letter-spacing:.08em;line-height:1;}
.hdate{font-size:.62rem;color:var(--muted);letter-spacing:.14em;margin-top:.25rem;}
.leave-btn{display:none;background:transparent;border:1px solid rgba(220,90,70,.25);border-radius:1px;color:rgba(220,100,80,.6);font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.2em;padding:.45rem .9rem;cursor:pointer;transition:all .3s;}
.leave-btn:hover{border-color:rgba(220,90,70,.5);color:rgba(230,120,100,.9);background:rgba(220,90,70,.06);}
#lobby{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:3rem 1.5rem 4rem;}
.lobby-hero{text-align:center;margin-bottom:2.5rem;}
.lobby-eye{font-size:.64rem;color:rgba(210,168,68,.42);letter-spacing:.3em;margin-bottom:1rem;display:flex;align-items:center;justify-content:center;gap:.8rem;}
.lobby-eye::before,.lobby-eye::after{content:'';width:40px;height:1px;background:rgba(210,168,68,.18);}
.lobby-title{font-family:'Cinzel',serif;font-size:2.2rem;font-weight:600;color:rgba(225,195,120,.95);letter-spacing:.15em;line-height:1.1;margin-bottom:.6rem;}
.lobby-sub{font-size:.8rem;color:var(--muted);letter-spacing:.12em;}
.count-badge{display:flex;align-items:center;gap:1.2rem;margin-bottom:2.5rem;padding:.9rem 1.8rem;border:1px solid var(--gold-dim);border-radius:2px;background:var(--gold-faint);}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(72,200,120,.5);animation:pg 2s ease-in-out infinite;}
@keyframes pg{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.25)}}
.count-txt{font-family:'DM Mono',monospace;font-size:.9rem;color:rgba(210,190,140,.8);}
.count-n{font-size:1.3rem;color:rgba(220,195,130,.95);margin:0 .15rem;}
.lobby-grid{width:100%;max-width:820px;display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:1rem;margin-bottom:3rem;}
.lobby-card{background:rgba(18,14,8,.7);border:1px solid rgba(210,168,68,.1);border-radius:2px;padding:1.2rem 1.4rem;cursor:pointer;transition:all .28s;animation:cin .5s cubic-bezier(.16,1,.3,1) both;position:relative;overflow:hidden;}
.lobby-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(210,168,68,.06),transparent);opacity:0;transition:opacity .3s;}
.lobby-card:hover{border-color:rgba(210,168,68,.28);transform:translateY(-2px);}
.lobby-card:hover::after{opacity:1;}
@keyframes cin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.lc-top{display:flex;align-items:center;gap:.9rem;margin-bottom:.9rem;}
.lc-av{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem;border:1px solid rgba(210,168,68,.18);background:linear-gradient(135deg,rgba(210,168,68,.12),rgba(140,100,40,.08));}
.lc-name{font-size:.95rem;font-weight:600;color:rgba(225,205,160,.9);}
.lc-meta{display:flex;align-items:center;gap:.6rem;margin-top:.2rem;}
.lc-time{font-family:'DM Mono',monospace;font-size:.66rem;color:var(--muted);}
.lc-sbadge{font-size:.56rem;padding:.12rem .38rem;border-radius:1px;background:rgba(72,200,120,.1);border:1px solid rgba(72,200,120,.22);color:rgba(72,200,120,.75);}
.lc-task{font-size:.78rem;color:rgba(180,158,110,.55);line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lc-hint{font-size:.6rem;color:rgba(210,168,68,.28);letter-spacing:.1em;margin-top:.7rem;text-align:right;}
.lobby-empty{grid-column:1/-1;text-align:center;padding:3rem;color:var(--muted);font-size:.82rem;letter-spacing:.1em;line-height:2;}
.start-btn{padding:1.1rem 3.5rem;background:linear-gradient(135deg,rgba(210,155,50,.18),rgba(180,125,35,.08));border:1px solid rgba(210,168,68,.4);border-radius:1px;color:rgba(225,195,120,.95);font-family:'Cinzel',serif;font-size:.95rem;letter-spacing:.35em;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;}
.start-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(210,168,68,.18),transparent);opacity:0;transition:opacity .3s;}
.start-btn:hover::before{opacity:1;}
.start-btn:hover{border-color:rgba(210,168,68,.7);box-shadow:0 0 30px rgba(210,155,50,.12);color:rgba(240,215,140,1);}
.overlay{position:fixed;inset:0;z-index:100;background:rgba(8,6,4,.78);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:1.5rem;animation:fi .25s ease;}
.overlay.hidden{display:none;}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{width:100%;max-width:440px;background:rgba(18,14,8,.97);border:1px solid rgba(210,168,68,.18);border-radius:2px;padding:2.5rem 2.5rem 3rem;box-shadow:0 0 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(210,168,68,.07);animation:mi .35s cubic-bezier(.16,1,.3,1);}
@keyframes mi{from{opacity:0;transform:scale(.96) translateY(12px)}to{opacity:1;transform:none}}
.modal-title{font-family:'Cinzel',serif;font-size:.95rem;font-weight:400;color:rgba(210,168,68,.8);letter-spacing:.3em;text-align:center;margin-bottom:.3rem;}
.modal-sub{font-size:.68rem;color:var(--muted);text-align:center;letter-spacing:.12em;margin-bottom:2rem;}
.field{margin-bottom:1.3rem;}
.field label{font-size:.65rem;color:rgba(210,168,68,.5);letter-spacing:.2em;display:block;margin-bottom:.55rem;}
.field input{width:100%;background:rgba(255,255,255,.025);border:1px solid rgba(210,168,68,.12);border-radius:1px;padding:.8rem 1rem;color:var(--text);font-family:'Noto Serif SC',serif;font-size:.9rem;outline:none;transition:border-color .3s,background .3s;}
.field input::placeholder{color:rgba(180,150,100,.22);}
.field input:focus{border-color:rgba(210,168,68,.38);background:rgba(210,168,68,.035);}
.field-err{font-size:.65rem;color:rgba(220,100,80,.7);margin-top:.35rem;}
.modal-btns{display:flex;gap:.8rem;margin-top:1.8rem;}
.btn-cancel{flex:1;padding:.85rem;background:transparent;border:1px solid rgba(210,168,68,.12);border-radius:1px;color:var(--muted);font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.2em;cursor:pointer;transition:all .3s;}
.btn-cancel:hover{border-color:rgba(210,168,68,.25);color:rgba(200,180,130,.7);}
.btn-confirm{flex:2;padding:.85rem;background:linear-gradient(135deg,rgba(210,155,50,.16),rgba(180,125,35,.08));border:1px solid rgba(210,168,68,.35);border-radius:1px;color:rgba(220,190,115,.9);font-family:'Cinzel',serif;font-size:.78rem;letter-spacing:.25em;cursor:pointer;transition:all .3s;}
.btn-confirm:hover{border-color:rgba(210,168,68,.6);color:rgba(240,210,130,1);}
#room{display:none;position:relative;z-index:1;flex-direction:column;}
.room-body{flex:1;display:grid;grid-template-columns:280px 1fr;gap:2rem;max-width:1200px;margin:0 auto;width:100%;padding:2rem 2rem 3rem;}
.panel-lbl{font-size:.62rem;color:rgba(210,168,68,.42);letter-spacing:.25em;margin-bottom:1.1rem;display:flex;align-items:center;gap:.7rem;}
.panel-lbl::after{content:'';flex:1;height:1px;background:rgba(210,168,68,.08);}
.my-panel{position:sticky;top:2rem;align-self:start;}
.my-card{background:rgba(210,168,68,.04);border:1px solid rgba(210,168,68,.14);border-radius:2px;padding:1.7rem;position:relative;overflow:hidden;}
.my-card::before{content:'';position:absolute;top:0;left:0;width:2px;height:100%;background:linear-gradient(180deg,rgba(210,168,68,.7),rgba(210,168,68,.08));}
.my-av{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,rgba(210,155,50,.25),rgba(180,125,40,.12));border:1px solid rgba(210,168,68,.28);display:flex;align-items:center;justify-content:center;font-size:1.25rem;margin-bottom:.95rem;}
.my-name{font-size:1.05rem;font-weight:600;color:rgba(228,205,152,.95);margin-bottom:.25rem;}
.my-el{font-family:'DM Mono',monospace;font-size:.82rem;color:rgba(210,168,68,.65);margin-bottom:1.1rem;}
.my-tl{font-size:.6rem;color:var(--muted);letter-spacing:.18em;margin-bottom:.38rem;}
.my-tv{font-size:.88rem;color:rgba(208,182,136,.75);line-height:1.6;padding:.75rem;background:rgba(0,0,0,.18);border-radius:1px;border-left:2px solid rgba(210,168,68,.18);}
.share-tog{display:flex;align-items:center;gap:1rem;padding:.85rem 1rem;border:1px solid rgba(210,168,68,.1);border-radius:1px;background:rgba(255,255,255,.02);cursor:pointer;transition:all .3s;user-select:none;margin-top:1rem;}
.share-tog:hover{border-color:rgba(210,168,68,.22);}
.tog-icon{font-size:1.1rem;opacity:.7;}
.tog-lbl{font-size:.82rem;color:rgba(210,190,150,.8);}
.tog-desc{font-size:.65rem;color:var(--muted);margin-top:.15rem;}
.tog-sw{width:36px;height:20px;border-radius:10px;background:rgba(255,255,255,.08);border:1px solid rgba(210,168,68,.15);position:relative;transition:all .3s;flex-shrink:0;}
.tog-sw.on{background:rgba(210,168,68,.3);border-color:rgba(210,168,68,.5);}
.tog-knob{width:14px;height:14px;border-radius:50%;background:rgba(180,150,100,.5);position:absolute;top:2px;left:2px;transition:all .3s;}
.tog-sw.on .tog-knob{left:18px;background:rgba(220,185,110,.9);}
.mems-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.2rem;}
.mem-card{background:rgba(14,11,7,.8);border:1px solid rgba(210,168,68,.1);border-radius:2px;overflow:hidden;transition:border-color .28s,transform .28s,box-shadow .28s;cursor:pointer;}
.mem-card:hover{border-color:rgba(210,168,68,.28);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.4);}
.mem-screen-wrap{width:100%;aspect-ratio:16/9;background:#000;position:relative;overflow:hidden;}
.mem-screen-wrap video{width:100%;height:100%;object-fit:cover;display:block;}
.mem-screen-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:.5rem;background:#000;}
.mem-screen-ph-ico{font-size:1.5rem;opacity:.3;}
.mem-screen-ph-txt{font-size:.68rem;letter-spacing:.08em;opacity:.6;}
.mem-hover-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0);transition:background .25s;}
.mem-card:hover .mem-hover-hint{background:rgba(0,0,0,.4);}
.mem-expand-lbl{opacity:0;transform:scale(.85);transition:all .25s;background:rgba(210,168,68,.2);border:1px solid rgba(210,168,68,.5);border-radius:1px;padding:.4rem .9rem;font-size:.68rem;color:rgba(220,190,110,.95);letter-spacing:.15em;font-family:'Cinzel',serif;}
.mem-card:hover .mem-expand-lbl{opacity:1;transform:scale(1);}
.mem-info-row{padding:1rem 1.2rem;display:flex;align-items:center;gap:.9rem;}
.mem-av{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.95rem;border:1px solid rgba(210,168,68,.14);background:linear-gradient(135deg,rgba(100,80,180,.14),rgba(60,50,120,.08));}
.mem-details{flex:1;min-width:0;}
.mc-name{font-size:.9rem;font-weight:600;color:rgba(210,188,148,.88);margin-bottom:.15rem;}
.mc-meta{display:flex;align-items:center;gap:.7rem;margin-bottom:.3rem;flex-wrap:wrap;}
.mc-dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 5px rgba(72,200,120,.4);animation:pg 2s infinite;flex-shrink:0;}
.mc-time{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);}
.mc-sb{font-size:.58rem;padding:.1rem .35rem;border-radius:1px;background:rgba(72,200,120,.1);border:1px solid rgba(72,200,120,.22);color:rgba(72,200,120,.75);}
.mc-task{font-size:.75rem;color:rgba(175,152,108,.55);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.empty-st{grid-column:1/-1;text-align:center;padding:4rem 2rem;color:var(--muted);}
.empty-ico{font-size:2.2rem;margin-bottom:.9rem;opacity:.35;}
.empty-txt{font-size:.82rem;letter-spacing:.08em;line-height:1.9;}
.det-overlay{position:fixed;inset:0;z-index:200;background:rgba(4,3,2,.92);backdrop-filter:blur(14px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;animation:fi .25s ease;}
.det-overlay.hidden{display:none;}
.det-top{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:960px;margin-bottom:1rem;}
.det-info{display:flex;align-items:center;gap:1rem;}
.det-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;border:1px solid rgba(210,168,68,.22);background:linear-gradient(135deg,rgba(210,155,50,.2),rgba(180,125,40,.1));}
.det-name{font-size:1rem;font-weight:600;color:rgba(228,205,152,.95);}
.det-el{font-family:'DM Mono',monospace;font-size:.78rem;color:rgba(210,168,68,.6);margin-top:.15rem;}
.det-task{font-size:.75rem;color:var(--muted);margin-top:.1rem;}
.det-close{background:transparent;border:1px solid rgba(210,168,68,.2);border-radius:1px;color:var(--muted);font-size:.75rem;font-family:'Cinzel',serif;letter-spacing:.2em;padding:.45rem .9rem;cursor:pointer;transition:all .3s;}
.det-close:hover{border-color:rgba(210,168,68,.5);color:var(--text);}
.det-screen{width:100%;max-width:960px;aspect-ratio:16/9;background:#000;border:1px solid rgba(210,168,68,.12);border-radius:2px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.det-screen video{width:100%;height:100%;object-fit:contain;display:none;}
.det-ph{text-align:center;color:var(--muted);}
.det-ph-ico{font-size:2.5rem;opacity:.25;margin-bottom:.8rem;}
.det-ph-txt{font-size:.8rem;letter-spacing:.08em;line-height:1.8;}
.connecting{font-size:.75rem;color:rgba(210,168,68,.5);display:flex;align-items:center;gap:.7rem;}
.spin{width:12px;height:12px;border:1.5px solid rgba(210,168,68,.2);border-top-color:rgba(210,168,68,.7);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:rgba(180,50,30,.92);color:#fff;font-size:.8rem;padding:.7rem 1.5rem;border-radius:2px;z-index:999;display:none;white-space:nowrap;}
.hidden{display:none!important;}
@media(max-width:800px){.room-body{grid-template-columns:1fr;padding:1.2rem 1rem 2rem;}.site-header{padding:1rem 1.2rem;}.modal{padding:2rem 1.5rem 2.5rem;}.lobby-title{font-size:1.6rem;}.mems-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="bg"></div><div class="glow g1"></div><div class="glow g2"></div><div class="glow g3"></div>
<div class="toast" id="toast"></div>

<header class="site-header">
  <div class="brand"><div class="brand-dot"></div>STUDY ROOM<div class="brand-dot"></div></div>
  <div class="hclock"><div class="htime" id="htime">--:--</div><div class="hdate" id="hdate"></div></div>
  <div style="min-width:120px;display:flex;justify-content:flex-end;">
    <button class="leave-btn" id="leave-btn" onclick="handleLeave()">离开自习室</button>
  </div>
</header>

<div id="lobby">
  <div class="lobby-hero">
    <div class="lobby-eye">OPEN STUDY SESSION</div>
    <div class="lobby-title">自习室</div>
    <div class="lobby-sub">专注当下，与同行者共进</div>
  </div>
  <div class="count-badge"><div class="live-dot"></div><div class="count-txt">当前在线 <span class="count-n" id="lobby-count">0</span> 人正在自习</div></div>
  <div class="lobby-grid" id="lobby-grid"><div class="lobby-empty">暂无成员，成为第一个进入的人吧 ✨</div></div>
  <button class="start-btn" onclick="openJoinModal()">开始自习</button>
</div>

<div class="overlay hidden" id="join-modal">
  <div class="modal">
    <div class="modal-title">进入自习室</div>
    <div class="modal-sub">告诉大家你是谁，今天要做什么</div>
    <div class="field"><label>用户名</label><input id="inp-user" placeholder="你想被叫什么？"/><div class="field-err" id="err-user"></div></div>
    <div class="field"><label>今日任务</label><input id="inp-task" placeholder="今天要专注什么？"/><div class="field-err" id="err-task"></div></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeJoinModal()">取消</button>
      <button class="btn-confirm" id="confirm-btn" onclick="handleJoin()">进入自习室 →</button>
    </div>
  </div>
</div>

<div id="room">
  <div class="room-body">
    <div class="my-panel">
      <div class="panel-lbl">我的状态</div>
      <div class="my-card">
        <div class="my-av" id="my-av">🧑‍💻</div>
        <div class="my-name" id="my-name"></div>
        <div class="my-el" id="my-el">⏱ 0s</div>
        <div class="my-tl">当前任务</div>
        <div class="my-tv" id="my-tv"></div>
        <div class="share-tog" onclick="toggleShare()">
          <div class="tog-icon">🖥️</div>
          <div style="flex:1;"><div class="tog-lbl">共享我的屏幕</div><div class="tog-desc" id="tog-desc">开启后他人可实时查看</div></div>
          <div class="tog-sw" id="tog-sw"><div class="tog-knob"></div></div>
        </div>
      </div>
    </div>
    <div>
      <div class="panel-lbl">自习室成员 <span style="font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);margin-left:.4rem;" id="room-cnt">(0 人)</span></div>
      <div class="mems-grid" id="room-grid"></div>
    </div>
  </div>
</div>

<div class="det-overlay hidden" id="det-overlay">
  <div class="det-top">
    <div class="det-info">
      <div class="det-av" id="d-av">👤</div>
      <div><div class="det-name" id="d-name"></div><div class="det-el" id="d-el"></div><div class="det-task" id="d-task"></div></div>
    </div>
    <button class="det-close" onclick="closeDetail()">✕ 关闭</button>
  </div>
  <div class="det-screen">
    <div class="det-ph" id="det-ph"><div class="det-ph-ico">🖥️</div><div class="det-ph-txt" id="det-ph-txt">该成员未开启屏幕共享</div></div>
    <video id="det-video" autoplay playsinline></video>
  </div>
</div>

<script>
const SUPABASE_URL = "https://pnadzkvsgyrccznvxikn.supabase.co";
const SUPABASE_KEY = "sb_publishable_vo7oHppoqPcpvI4WosA3lg_YlDO0ETc";

/* ── SUPABASE CLIENT ── */
async function sbFetch(path, opts={}) {
  const r = await fetch(SUPABASE_URL + path, {
    ...opts,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json",
      
      ...(opts.headers||{})
    }
  });
  if(!r.ok && r.status !== 204) {
    const t = await r.text();
    throw new Error(r.status + " " + t);
  }
  if(r.status === 204) return null;
  return r.json();
}

// Realtime via Supabase Realtime WebSocket
let realtimeWs = null;
function connectRealtime(onMembers) {
  const wsUrl = SUPABASE_URL.replace("https://","wss://") + "/realtime/v1/websocket?apikey=" + SUPABASE_KEY + "&vsn=1.0.0";
  const ws = new WebSocket(wsUrl);
  realtimeWs = ws;

  ws.onopen = () => {
    ws.send(JSON.stringify({topic:"realtime:public:members", event:"phx_join", payload:{config:{broadcast:{self:true},presence:{key:""}}}, ref:"1"}));
  };

  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if(msg.event === "postgres_changes" || msg.topic === "realtime:public:members") {
      loadMembers().then(onMembers);
    }
    // heartbeat
    if(msg.event === "heartbeat") ws.send(JSON.stringify({topic:"phoenix",event:"heartbeat",payload:{},ref:"hb"}));
  };

  ws.onclose = () => { setTimeout(()=>connectRealtime(onMembers), 2000); };
  ws.onerror = () => ws.close();

  // Subscribe to postgres changes
  ws.onopen = () => {
    ws.send(JSON.stringify({
      topic: "realtime:public:members",
      event: "phx_join",
      payload: {
        config: {
          broadcast: {self: true},
          postgres_changes: [{event: "*", schema: "public", table: "members"}]
        }
      },
      ref: "1"
    }));
  };

  // keep-alive ping every 25s
  setInterval(() => {
    if(ws.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({topic:"phoenix",event:"heartbeat",payload:{},ref:"hb"}));
  }, 25000);
}

async function loadMembers() {
  const now = Date.now();
  const cutoff = now - 20000;
  try {
    const rows = await sbFetch(`/rest/v1/members?last_seen=gt.${cutoff}&select=*`);
    return rows || [];
  } catch { return []; }
}

async function upsertMember(m) {
  await fetch(SUPABASE_URL + "/rest/v1/members", {
    method: "POST",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json",
      "Prefer": "resolution=merge-duplicates,return=minimal"
    },
    body: JSON.stringify({
      id: m.id, username: m.username, task: m.task,
      join_time: m.joinTime, last_seen: m.lastSeen, sharing: m.sharing
    })
  });
}

async function deleteMember(id) {
  await fetch(SUPABASE_URL + `/rest/v1/members?id=eq.${id}`, {
    method: "DELETE",
    headers: {"apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY}
  }).catch(()=>{});
}

/* ── STATE ── */
let myId=null, myRef=null, joinTime=null, meData={};
let localStream=null, sharerConns={}, viewerConns={}, viewerStreams={};
let viewingId=null, heartTimer=null, elapsedTimer=null, detTimer=null;
let allMembers={};
const ICE={iceServers:[{urls:"stun:stun.l.google.com:19302"},{urls:"stun:stun1.l.google.com:19302"}]};

const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const fmt  = ms => { if(ms<0)ms=0; const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60; return h?`${h}h ${m}m ${sc}s`:m?`${m}m ${sc}s`:`${sc}s`; };
const esc  = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const AVS  = ["👩‍💻","👨‍🎓","🧑‍🎨","👩‍🔬","🧑‍💼","👨‍🏫","🧑‍🚀","👩‍🎤","🧑‍🔬","👨‍💻","🧑‍🍳","👨‍🎨"];
const av   = n => AVS[n.charCodeAt(0) % AVS.length];

function showToast(msg) {
  const t=document.getElementById("toast");
  t.textContent=msg; t.style.display="block";
  setTimeout(()=>t.style.display="none",5000);
}

/* ── CLOCK ── */

  document.getElementById("hdate").textContent=n.toLocaleDateString("zh-CN",{month:"long",day:"numeric",weekday:"short"});

/* ── START REALTIME ── */
function onMembersUpdate(rows) {
  const prev = {...allMembers};
  allMembers = {};
  rows.forEach(r => {
    allMembers[r.id] = {
      username: r.username, task: r.task,
      joinTime: r.join_time, lastSeen: r.last_seen, sharing: r.sharing
    };
  });

  if(myId) {
    Object.entries(allMembers).forEach(([id,m]) => {
      if(id!==myId && m.sharing && !viewerConns[id]) startThumbnail(id);
    });
    Object.keys(viewerConns).forEach(id => {
      if(!allMembers[id]) dropThumbnail(id);
    });
  }

  renderLobby();
  if(myId) renderRoom();
}

// Poll every 5s as fallback + realtime
connectRealtime(onMembersUpdate);
setInterval(()=>loadMembers().then(onMembersUpdate), 8000);
loadMembers().then(onMembersUpdate);

/* ── LOBBY ── */

    <div class="lobby-card" style="animation-delay:${i*.06}s" data-id="${id}">

        </div></div>

/* ── ROOM ── */
function renderRoom() {
  const others=Object.entries(allMembers).filter(([id])=>id!==myId);
  document.getElementById("room-cnt").textContent=`(${others.length} 人)`;
  const grid=document.getElementById("room-grid");
  if(!others.length){
    grid.innerHTML='<div class="empty-st"><div class="empty-ico">🌙</div><div class="empty-txt">自习室目前只有你<br>把链接分享给朋友，一起专注吧</div></div>';
    return;
  }
  const newIds=new Set(others.map(([id])=>id));
  [...grid.children].forEach(el=>{if(!el.dataset.id||!newIds.has(el.dataset.id))el.remove();});
  others.forEach(([id,m],i)=>{
    let card=grid.querySelector(`.mem-card[data-id="${id}"]`);
    if(!card){
      card=document.createElement("div");
      card.className="mem-card"; card.dataset.id=id; card.style.animationDelay=`${i*.05}s`;
      card.innerHTML=`
        <div class="mem-screen-wrap">
          <div class="mem-screen-ph" id="sph-${id}"><div class="mem-screen-ph-ico">🖥️</div><div class="mem-screen-ph-txt">${m.sharing?"连接中…":"未开启共享"}</div></div>
          <video id="svid-${id}" autoplay playsinline muted style="display:none;width:100%;height:100%;object-fit:cover;position:absolute;inset:0;"></video>
          <div class="mem-hover-hint"><div class="mem-expand-lbl">展开查看</div></div>
        </div>
        <div class="mem-info-row">
          <div class="mem-av">${av(m.username)}</div>
          <div class="mem-details">
            <div class="mc-name">${esc(m.username)}</div>
            <div class="mc-meta"><div class="mc-dot"></div><span class="mc-time" id="mtime-${id}">已学习 ${fmt(Date.now()-m.joinTime)}</span>${m.sharing?'<span class="mc-sb">📺 共享中</span>':''}</div>
            <div class="mc-task">${esc(m.task)}</div>
          </div>
        </div>`;

      grid.appendChild(card);
    } else {
      const tEl=card.querySelector(`#mtime-${id}`);
      if(tEl) tEl.textContent="已学习 "+fmt(Date.now()-m.joinTime);

}

function attachStream(id) {
  const stream=viewerStreams[id], video=document.getElementById(`svid-${id}`), ph=document.getElementById(`sph-${id}`);
  if(!video||!stream) return;
  if(video.srcObject!==stream){video.srcObject=stream;video.style.display="block";if(ph)ph.style.display="none";}
  if(viewingId===id) feedDetail(stream);
}

/* ── WebRTC THUMBNAIL ──
   Signal path via Supabase members table using special signal rows
   Actually: use a separate signals table approach via polling
   Simpler: embed signals in a separate table
*/
// We'll use the Supabase REST API for signaling with a signals table
// First let's create the signals inline using a simple polling approach

async function sbSignalWrite(path, data) {
  // encode path as id, store data as json
  const id = path.replace(/\//g, "__");
  await sbFetch("/rest/v1/signals", {
    method: "POST",
    headers: {"Prefer": "resolution=merge-duplicates,return=minimal"},
    body: JSON.stringify({id, data: JSON.stringify(data), ts: Date.now()})
  }).catch(()=>{});
}

async function sbSignalRead(path) {
  const id = path.replace(/\//g, "__");
  try {
    const rows = await sbFetch(`/rest/v1/signals?id=eq.${encodeURIComponent(id)}&select=data`);
    if(rows && rows.length) return JSON.parse(rows[0].data);
  } catch{}
  return null;
}

async function sbSignalDelete(path) {
  const id = path.replace(/\//g, "__");
  await sbFetch(`/rest/v1/signals?id=eq.${encodeURIComponent(id)}`, {method:"DELETE"}).catch(()=>{});
}

async function startThumbnail(sharerId) {
  if(viewerConns[sharerId]) return;
  const pc=new RTCPeerConnection(ICE);
  viewerConns[sharerId]=pc;
  pc.addTransceiver("video",{direction:"recvonly"});
  pc.ontrack=e=>{viewerStreams[sharerId]=e.streams[0];attachStream(sharerId);};
  let vic=[];
  pc.onicecandidate=e=>{
    if(e.candidate){
      sbSignalWrite(`vic/${sharerId}/${myId}/${vic.length}`,{c:e.candidate.toJSON()});
      vic.push(1);
    }
  };
  const offer=await pc.createOffer();
  await pc.setLocalDescription(offer);
  await sbSignalWrite(`offer/${sharerId}/${myId}`,{sdp:offer.sdp,type:offer.type});

  // poll for answer
  let answered=false;
  const pollAnswer=setInterval(async()=>{
    if(answered||pc.signalingState!=="have-local-offer"){clearInterval(pollAnswer);return;}
    const ans=await sbSignalRead(`answer/${sharerId}/${myId}`);
    if(ans){answered=true;clearInterval(pollAnswer);try{await pc.setRemoteDescription(ans);}catch{}}
  },1000);

  // poll for sharer ICE
  const gotSic=new Set();
  setInterval(async()=>{
    for(let i=0;i<20;i++){
      if(gotSic.has(i)) continue;
      const c=await sbSignalRead(`sic/${sharerId}/${myId}/${i}`);
      if(c){gotSic.add(i);try{await pc.addIceCandidate(new RTCIceCandidate(c.c));}catch{}}
    }
  },1500);

  pc.onconnectionstatechange=()=>{
    if(["failed","closed"].includes(pc.connectionState)) dropThumbnail(sharerId);
  };
}

function dropThumbnail(id) {
  const pc=viewerConns[id];
  if(pc){try{pc.close();}catch{} delete viewerConns[id];}
  delete viewerStreams[id];
  const v=document.getElementById(`svid-${id}`); if(v){v.srcObject=null;v.style.display="none";}
  const ph=document.getElementById(`sph-${id}`); if(ph){ph.style.display="flex";ph.querySelector(".mem-screen-ph-txt").textContent="未开启共享";}
}

function listenAsSharer() {
  setInterval(async()=>{
    if(!myId||!localStream) return;
    // check for any pending offers
    try {
      const rows=await sbFetch(`/rest/v1/signals?id=like.offer__${myId}__*&select=id,data`)||[];
      for(const row of rows){
        const vid=row.id.replace(`offer__${myId}__`,"");
        if(sharerConns[vid]) continue;
        const offerData=JSON.parse(row.data);
        answerViewer(vid,offerData);
      }
    } catch{}
  },1500);
}

async function answerViewer(vid,offerData){
  const pc=new RTCPeerConnection(ICE);
  sharerConns[vid]=pc;
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  let sic=[];
  pc.onicecandidate=e=>{
    if(e.candidate){
      sbSignalWrite(`sic/${myId}/${vid}/${sic.length}`,{c:e.candidate.toJSON()});
      sic.push(1);
    }
  };
  try{
    await pc.setRemoteDescription({sdp:offerData.sdp,type:offerData.type});
    const answer=await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await sbSignalWrite(`answer/${myId}/${vid}`,{sdp:answer.sdp,type:answer.type});
  }catch{return;}

  const gotVic=new Set();
  const pollVic=setInterval(async()=>{
    if(["disconnected","failed","closed"].includes(pc.connectionState)){clearInterval(pollVic);return;}
    for(let i=0;i<20;i++){
      if(gotVic.has(i)) continue;
      const c=await sbSignalRead(`vic/${myId}/${vid}/${i}`);
      if(c){gotVic.add(i);try{await pc.addIceCandidate(new RTCIceCandidate(c.c));}catch{}}
    }
  },1500);

  pc.onconnectionstatechange=()=>{
    if(["disconnected","failed","closed"].includes(pc.connectionState)){
      clearInterval(pollVic); pc.close(); delete sharerConns[vid];
    }
  };
}

/* ── JOIN ── */
window.openJoinModal=()=>document.getElementById("join-modal").classList.remove("hidden");
window.closeJoinModal=()=>document.getElementById("join-modal").classList.add("hidden");
["inp-user","inp-task"].forEach(id=>document.getElementById(id).addEventListener("keydown",e=>{if(e.key==="Enter")handleJoin();}));

window.handleJoin=async()=>{
  const username=document.getElementById("inp-user").value.trim();
  const task=document.getElementById("inp-task").value.trim();
  let ok=true;
  document.getElementById("err-user").textContent="";
  document.getElementById("err-task").textContent="";
  if(!username){document.getElementById("err-user").textContent="⚠ 请输入用户名";ok=false;}
  if(!task){document.getElementById("err-task").textContent="⚠ 请输入今日任务";ok=false;}
  if(!ok) return;
  const btn=document.getElementById("confirm-btn");
  btn.textContent="进入中…"; btn.disabled=true;
  try{
    myId=uid(); joinTime=Date.now();
    meData={id:myId,username,task,joinTime,lastSeen:Date.now(),sharing:false};
    await upsertMember(meData);
    heartTimer=setInterval(async()=>{
      try{meData.lastSeen=Date.now();await upsertMember(meData);}catch{}
    },5000);
    elapsedTimer=setInterval(()=>{
      document.getElementById("my-el").textContent="⏱ "+fmt(Date.now()-joinTime);
    },1000);
    closeJoinModal();
    document.getElementById("lobby").style.display="none";
    document.getElementById("room").style.display="flex";
    document.getElementById("leave-btn").style.display="block";
    document.getElementById("my-av").textContent=av(username);
    document.getElementById("my-name").textContent=username;
    document.getElementById("my-tv").textContent=task;
    listenAsSharer();
    window.addEventListener("beforeunload",()=>{deleteMember(myId);});
    Object.entries(allMembers).forEach(([id,m])=>{if(id!==myId&&m.sharing)startThumbnail(id);});
  }catch(e){showToast("进入失败: "+e.message);}
  finally{btn.textContent="进入自习室 →";btn.disabled=false;}
};

/* ── SCREEN SHARE ── */
window.toggleShare=async()=>{
  const sw=document.getElementById("tog-sw"),desc=document.getElementById("tog-desc");
  if(localStream){
    localStream.getTracks().forEach(t=>t.stop());localStream=null;
    sw.classList.remove("on");desc.textContent="开启后他人可实时查看";
    Object.values(sharerConns).forEach(pc=>{try{pc.close();}catch{}});sharerConns={};
    meData.sharing=false;meData.lastSeen=Date.now();
    try{await upsertMember(meData);}catch{}
  }else{
    try{
      localStream=await navigator.mediaDevices.getDisplayMedia({video:true,audio:false});
      localStream.getVideoTracks()[0].addEventListener("ended",async()=>{
        localStream=null;sw.classList.remove("on");desc.textContent="开启后他人可实时查看";
        Object.values(sharerConns).forEach(pc=>{try{pc.close();}catch{}});sharerConns={};
        meData.sharing=false;meData.lastSeen=Date.now();
        try{await upsertMember(meData);}catch{}
      });
      sw.classList.add("on");desc.textContent="屏幕共享已开启 🟢";
      meData.sharing=true;meData.lastSeen=Date.now();
      try{await upsertMember(meData);}catch{}
    }catch{localStream=null;sw.classList.remove("on");}
  }
};

/* ── LEAVE ── */
window.handleLeave=async()=>{
  clearInterval(heartTimer);clearInterval(elapsedTimer);
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  Object.values(sharerConns).forEach(pc=>{try{pc.close();}catch{}});sharerConns={};
  Object.keys(viewerConns).forEach(id=>dropThumbnail(id));
  try{await deleteMember(myId);}catch{}
  myId=null;joinTime=null;meData={};
  document.getElementById("tog-sw").classList.remove("on");
  document.getElementById("tog-desc").textContent="开启后他人可实时查看";
  document.getElementById("room").style.display="none";
  document.getElementById("lobby").style.display="flex";
  document.getElementById("leave-btn").style.display="none";
  document.getElementById("my-el").textContent="⏱ 0s";
  document.getElementById("room-grid").innerHTML="";
};

/* ── DETAIL ── */
window.openDetail=(id,m)=>{
  if(!m) return; viewingId=id;
  document.getElementById("d-av").textContent=av(m.username);
  document.getElementById("d-name").textContent=m.username;
  document.getElementById("d-task").textContent="📌 "+m.task;
  document.getElementById("d-el").textContent="已学习 "+fmt(Date.now()-m.joinTime);
  clearInterval(detTimer);
  detTimer=setInterval(()=>{const c=allMembers[id];if(c)document.getElementById("d-el").textContent="已学习 "+fmt(Date.now()-c.joinTime);},1000);
  const dv=document.getElementById("det-video"),dp=document.getElementById("det-ph"),dptxt=document.getElementById("det-ph-txt");
  dv.style.display="none";dv.srcObject=null;dp.style.display="flex";
  document.getElementById("det-overlay").classList.remove("hidden");
  const stream=viewerStreams[id];
  if(stream){feedDetail(stream);}
  else if(m.sharing){dptxt.innerHTML='<div class="connecting"><div class="spin"></div> 正在连接…</div>';}
  else{dptxt.textContent="该成员未开启屏幕共享";}
};

function feedDetail(stream){
  const dv=document.getElementById("det-video"),dp=document.getElementById("det-ph");
  if(!dv)return;dv.srcObject=stream;dv.style.display="block";dp.style.display="none";
}

window.closeDetail=()=>{
  clearInterval(detTimer);
  document.getElementById("det-overlay").classList.add("hidden");
  const dv=document.getElementById("det-video");dv.srcObject=null;dv.style.display="none";
  document.getElementById("det-ph").style.display="flex";viewingId=null;
};
